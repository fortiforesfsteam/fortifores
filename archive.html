    <script>
    // Feather Icons
    feather.replace();

    // Mobile menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    menuToggle.addEventListener('click', () => {
      const isOpen = !mobileMenu.classList.contains('hidden');

      if (isOpen) {
        mobileMenu.classList.add('opacity-0', 'scale-y-0');
        setTimeout(() => mobileMenu.classList.add('hidden'), 200);
      } else {
        mobileMenu.classList.remove('hidden');
        setTimeout(() => mobileMenu.classList.remove('opacity-0', 'scale-y-0'), 10);
      }

      const icon = menuToggle.querySelector('i');
      const currentIcon = icon.getAttribute('data-feather');
      icon.setAttribute('data-feather', currentIcon === 'menu' ? 'x' : 'menu');
      feather.replace();
    });
  </script>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/90 flex items-center justify-center opacity-0 transition-opacity duration-300" onclick="closeLightbox()">
    <span class="absolute top-4 right-6 text-white text-4xl cursor-pointer hover:text-gray-300">&times;</span>
    <img id="lightbox-img" src="" class="max-w-[90%] max-h-[90vh] object-contain rounded-lg shadow-2xl transform scale-95 transition-transform duration-300">
  </div>

  <script>
    function openLightbox(src) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = src;
      lightbox.classList.remove('hidden');
      void lightbox.offsetWidth; // trigger reflow
      lightbox.classList.remove('opacity-0');
      img.classList.remove('scale-95');
      img.classList.add('scale-100');
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      lightbox.classList.add('opacity-0');
      img.classList.remove('scale-100');
      img.classList.add('scale-95');
      setTimeout(() => {
        lightbox.classList.add('hidden');
      }, 300);
    }
  </script>
